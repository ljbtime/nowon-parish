<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 – 천주교 노원성당</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .wrap {
      max-width: 600px;
      margin: 0 auto;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-area .cross { font-size: 2rem; color: #b8953a; }
    .logo-area h1 { font-size: 1.3rem; font-weight: 700; color: #1a2c4e; margin-top: 0.3rem; }
    .logo-area p { font-size: 0.82rem; color: #999; margin-top: 0.2rem; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #1a2c4e;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-left: 3px solid #b8953a;
      padding-left: 0.6rem;
      margin: 1.8rem 0 1rem;
    }
    .section-title:first-child { margin-top: 0; }

    .form-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
    }
    label .req { color: #e53e3e; margin-left: 2px; }
    label .opt { color: #aaa; font-weight: 400; font-size: 0.75rem; margin-left: 4px; }

    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #1a2c4e; }
    input.error { border-color: #e53e3e; }
    input.ok { border-color: #38a169; }

    .input-with-btn {
      display: flex;
      gap: 0.5rem;
    }
    .input-with-btn input { flex: 1; }
    .btn-check {
      flex-shrink: 0;
      padding: 0 1rem;
      background: #1a2c4e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-check:hover { background: #253d68; }

    .field-msg {
      font-size: 0.75rem;
      margin-top: 0.2rem;
      min-height: 1rem;
    }
    .field-msg.error { color: #e53e3e; }
    .field-msg.ok { color: #38a169; }

    .gender-group {
      display: flex;
      gap: 0.75rem;
    }
    .gender-btn {
      flex: 1;
      padding: 0.75rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .gender-btn.active {
      border-color: #1a2c4e;
      background: #1a2c4e;
      color: #fff;
      font-weight: 600;
    }

    .captcha-box {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1.5px solid #e0e0e0;
    }
    .captcha-question {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a2c4e;
      white-space: nowrap;
    }
    .captcha-input {
      width: 80px !important;
      text-align: center;
    }
    .captcha-refresh {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #999;
      padding: 0.2rem;
      flex-shrink: 0;
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: #1a2c4e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #253d68; }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

    .login-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.82rem;
      color: #999;
    }
    .login-link a { color: #1a2c4e; font-weight: 600; text-decoration: none; }

    .alert {
      padding: 0.9rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .alert.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }

    @media (max-width: 480px) {
      .form-row { flex-direction: column; gap: 0; }
      .card { padding: 1.5rem 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-area">
      <div class="cross">✝</div>
      <h1>천주교 노원성당</h1>
      <p>회원가입</p>
    </div>

    <div class="card">
      <div class="alert error" id="alertError"></div>
      <div class="alert success" id="alertSuccess"></div>

      <!-- 로그인 정보 -->
      <div class="section-title">로그인 정보</div>

      <div class="form-group" style="margin-bottom:1rem">
        <label>아이디 <span class="req">*</span></label>
        <div class="input-with-btn">
          <input type="text" id="userId" placeholder="영문/숫자 4~20자" maxlength="20" />
          <button class="btn-check" onclick="checkId()">중복확인</button>
        </div>
        <span class="field-msg" id="userIdMsg"></span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>비밀번호 <span class="req">*</span></label>
          <input type="password" id="password" placeholder="8자 이상" />
          <span class="field-msg" id="pwMsg"></span>
        </div>
        <div class="form-group">
          <label>비밀번호 확인 <span class="req">*</span></label>
          <input type="password" id="passwordConfirm" placeholder="비밀번호 재입력" />
          <span class="field-msg" id="pwConfirmMsg"></span>
        </div>
      </div>

      <!-- 개인 정보 -->
      <div class="section-title">개인 정보</div>

      <div class="form-row">
        <div class="form-group">
          <label>이름 <span class="req">*</span></label>
          <input type="text" id="name" placeholder="이름 입력" />
        </div>
        <div class="form-group">
          <label>세례명 <span class="opt">(선택)</span></label>
          <input type="text" id="baptismalName" placeholder="세례명 입력" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>생년월일 <span class="req">*</span></label>
          <input type="date" id="birthDate" />
        </div>
        <div class="form-group">
          <label>성별 <span class="req">*</span></label>
          <div class="gender-group">
            <button class="gender-btn" id="genderM" onclick="setGender('M')">남</button>
            <button class="gender-btn" id="genderF" onclick="setGender('F')">여</button>
          </div>
        </div>
      </div>

      <!-- 연락처 -->
      <div class="section-title">연락처</div>

      <div class="form-row">
        <div class="form-group">
          <label>전화번호 <span class="opt">(선택)</span></label>
          <input type="tel" id="phone" placeholder="02-0000-0000" />
        </div>
        <div class="form-group">
          <label>핸드폰번호 <span class="req">*</span></label>
          <input type="tel" id="mobile" placeholder="010-0000-0000" />
        </div>
      </div>

      <div class="form-group" style="margin-bottom:1rem">
        <label>이메일 <span class="req">*</span></label>
        <input type="email" id="email" placeholder="example@email.com" />
        <span class="field-msg" id="emailMsg"></span>
      </div>

      <!-- 자동가입방지 -->
      <div class="section-title">자동가입방지</div>
      <div class="form-group">
        <label>아래 계산 결과를 입력하세요 <span class="req">*</span></label>
        <div class="captcha-box">
          <span class="captcha-question" id="captchaQuestion"></span>
          <input type="number" id="captchaAnswer" class="captcha-input" placeholder="?" />
          <button class="captcha-refresh" onclick="refreshCaptcha()" title="새로고침">🔄</button>
        </div>
        <span class="field-msg" id="captchaMsg"></span>
      </div>

      <button class="btn-submit" id="btnSubmit" onclick="submitJoin()">가입하기</button>

      <p class="login-link">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../../js/firebase-config.js';
    import {
      createUserWithEmailAndPassword,
      updateProfile
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      doc, setDoc, getDoc, collection, query, where, getDocs
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── 전역 상태 ──────────────────────────────
    let selectedGender = '';
    let idChecked = false;
    let captchaAnswer = 0;

    window.setGender = function(g) {
      selectedGender = g;
      document.getElementById('genderM').classList.toggle('active', g === 'M');
      document.getElementById('genderF').classList.toggle('active', g === 'F');
    };

    // ── 캡차 ──────────────────────────────────
    window.refreshCaptcha = function() {
      const a = Math.floor(Math.random() * 20) + 1;
      const b = Math.floor(Math.random() * 20) + 1;
      const ops = ['+', '-', '×'];
      const op = ops[Math.floor(Math.random() * ops.length)];
      let answer;
      if (op === '+') answer = a + b;
      else if (op === '-') answer = a - b;
      else answer = a * b;
      captchaAnswer = answer;
      document.getElementById('captchaQuestion').textContent = `${a} ${op} ${b} = ?`;
      document.getElementById('captchaAnswer').value = '';
    };
    refreshCaptcha();

    // ── 아이디 중복 확인 ───────────────────────
    window.checkId = async function() {
      const userId = document.getElementById('userId').value.trim();
      const msg = document.getElementById('userIdMsg');

      if (!/^[a-zA-Z0-9]{4,20}$/.test(userId)) {
        msg.textContent = '영문/숫자 4~20자로 입력해주세요.';
        msg.className = 'field-msg error';
        idChecked = false;
        return;
      }
      const snap = await getDocs(query(collection(db, 'users'), where('userId', '==', userId)));
      if (!snap.empty) {
        msg.textContent = '이미 사용 중인 아이디입니다.';
        msg.className = 'field-msg error';
        idChecked = false;
      } else {
        msg.textContent = '사용 가능한 아이디입니다.';
        msg.className = 'field-msg ok';
        idChecked = true;
      }
    };

    // ── 비밀번호 실시간 검증 ───────────────────
    document.getElementById('password').addEventListener('input', function() {
      const msg = document.getElementById('pwMsg');
      if (this.value.length < 8) {
        msg.textContent = '8자 이상 입력해주세요.';
        msg.className = 'field-msg error';
      } else {
        msg.textContent = '사용 가능한 비밀번호입니다.';
        msg.className = 'field-msg ok';
      }
    });

    document.getElementById('passwordConfirm').addEventListener('input', function() {
      const msg = document.getElementById('pwConfirmMsg');
      const pw = document.getElementById('password').value;
      if (this.value !== pw) {
        msg.textContent = '비밀번호가 일치하지 않습니다.';
        msg.className = 'field-msg error';
      } else {
        msg.textContent = '비밀번호가 일치합니다.';
        msg.className = 'field-msg ok';
      }
    });

    // ── 가입하기 ──────────────────────────────
    window.submitJoin = async function() {
      const userId     = document.getElementById('userId').value.trim();
      const password   = document.getElementById('password').value;
      const pwConfirm  = document.getElementById('passwordConfirm').value;
      const name       = document.getElementById('name').value.trim();
      const baptismal  = document.getElementById('baptismalName').value.trim();
      const birthDate  = document.getElementById('birthDate').value;
      const phone      = document.getElementById('phone').value.trim();
      const mobile     = document.getElementById('mobile').value.trim();
      const email      = document.getElementById('email').value.trim();
      const captchaIn  = parseInt(document.getElementById('captchaAnswer').value);
      const errEl      = document.getElementById('alertError');
      const succEl     = document.getElementById('alertSuccess');

      errEl.style.display = 'none';
      succEl.style.display = 'none';

      const showErr = (msg) => {
        errEl.textContent = msg;
        errEl.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // 유효성 검사
      if (!idChecked)          return showErr('아이디 중복확인을 해주세요.');
      if (password.length < 8) return showErr('비밀번호를 8자 이상 입력해주세요.');
      if (password !== pwConfirm) return showErr('비밀번호가 일치하지 않습니다.');
      if (!name)               return showErr('이름을 입력해주세요.');
      if (!birthDate)          return showErr('생년월일을 입력해주세요.');
      if (!selectedGender)     return showErr('성별을 선택해주세요.');
      if (!mobile)             return showErr('핸드폰번호를 입력해주세요.');
      if (!email)              return showErr('이메일을 입력해주세요.');
      if (captchaIn !== captchaAnswer) {
        document.getElementById('captchaMsg').textContent = '자동가입방지 답이 틀렸습니다.';
        document.getElementById('captchaMsg').className = 'field-msg error';
        refreshCaptcha();
        return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = '가입 처리 중...';

      try {
        // Firebase Auth로 계정 생성 (이메일+비밀번호)
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });

        // Firestore에 추가 정보 저장
        await setDoc(doc(db, 'users', cred.user.uid), {
          userId,
          name,
          baptismalName: baptismal || '',
          birthDate,
          gender: selectedGender,
          phone: phone || '',
          mobile,
          email,
          role: 'member',
          createdAt: new Date().toISOString()
        });

        succEl.textContent = `${name}님, 회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.`;
        succEl.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        setTimeout(() => { window.location.href = 'login.html'; }, 2000);

      } catch (err) {
        let msg = '가입 중 오류가 발생했습니다.';
        if (err.code === 'auth/email-already-in-use') msg = '이미 사용 중인 이메일입니다.';
        if (err.code === 'auth/invalid-email')        msg = '이메일 형식이 올바르지 않습니다.';
        showErr(msg);
        btn.disabled = false;
        btn.textContent = '가입하기';
      }
    };
  </script>
</body>
</html>
