<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 – 노원성당</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a2c4e 0%, #2a4070 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-logo {
      font-size: 2.5rem;
      color: #b8953a;
      margin-bottom: 0.5rem;
    }
    .login-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a2c4e;
      margin-bottom: 0.25rem;
    }
    .login-sub {
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #1a2c4e; }
    .btn-login {
      width: 100%;
      padding: 0.95rem;
      background: #1a2c4e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { background: #253d68; }
    .error-msg {
      color: #e53e3e;
      font-size: 0.82rem;
      margin-top: 0.75rem;
      display: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: #999;
      text-decoration: none;
    }
    .back-link:hover { color: #1a2c4e; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">✝</div>
    <h1 class="login-title">노원성당 관리자</h1>
    <p class="login-sub">관리자 계정으로 로그인하세요</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="admin@nwsd.kr" required />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력" required />
      </div>
      <button type="submit" class="btn-login">로그인</button>
      <p class="error-msg" id="errorMsg">이메일 또는 비밀번호가 올바르지 않습니다.</p>
    </form>
    <a href="../index.html" class="back-link">← 홈페이지로 돌아가기</a>
  </div>

  <script>
    // 로컬 개발용 임시 인증 (Firebase 배포 후 Firebase Auth로 교체)
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // 임시 계정 (배포 시 Firebase Auth로 교체)
      if (email === 'admin@nwsd.kr' && password === 'admin1234') {
        sessionStorage.setItem('adminLoggedIn', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });

    // 이미 로그인된 경우
    if (sessionStorage.getItem('adminLoggedIn')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
